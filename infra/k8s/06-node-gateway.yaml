apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalyst-node-gateway
  namespace: catalyst-os
  labels:
    app: catalyst-node-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalyst-node-gateway
  template:
    metadata:
      labels:
        app: catalyst-node-gateway
    spec:
      containers:
        - name: node-gateway
          image: catalyst-os/node-gateway:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: catalyst-config
            - secretRef:
                name: catalyst-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: catalyst-node-service
  namespace: catalyst-os
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: catalyst-node-gateway
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: catalyst-node-hpa
  namespace: catalyst-os
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: catalyst-node-gateway
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
