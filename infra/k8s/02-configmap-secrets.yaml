apiVersion: v1
kind: ConfigMap
metadata:
  name: catalyst-config
  namespace: catalyst-os
data:
  ENVIRONMENT: "production"
  FASTAPI_URL: "http://catalyst-fastapi-service:8000"
  VAULT_ADDR: "http://catalyst-vault-service:8200"
  DATABASE_URL: "postgresql://postgres:catalyst_secure_pass@catalyst-postgres-service:5432/catalyst_db?schema=public"
---
apiVersion: v1
kind: Secret
metadata:
  name: catalyst-secrets
  namespace: catalyst-os
type: Opaque
stringData:
  GEMINI_API_KEY: "placeholder-gemini-api-key"
  JWT_SECRET: "catalyst-os-super-secret-jwt-key-2026"
  VAULT_TOKEN: "root"
