apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalyst-fastapi
  namespace: catalyst-os
  labels:
    app: catalyst-fastapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalyst-fastapi
  template:
    metadata:
      labels:
        app: catalyst-fastapi
    spec:
      containers:
        - name: fastapi-ai-engine
          image: catalyst-os/fastapi-ai-engine:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: catalyst-config
            - secretRef:
                name: catalyst-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: catalyst-fastapi-service
  namespace: catalyst-os
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: catalyst-fastapi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: catalyst-fastapi-hpa
  namespace: catalyst-os
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: catalyst-fastapi
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
